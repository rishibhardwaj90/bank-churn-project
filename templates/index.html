<!DOCTYPE html>
<html>
<head>
    <title>Bank Churn Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }
        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Bank Churn Prediction</h2>

    <form action="/predict" method="post">
        <input type="number" name="credit_score" placeholder="Credit Score" required>
        <input type="number" name="age" placeholder="Age" required>
        <input type="number" name="balance" placeholder="Balance" required>

        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="0">Male</option>
            <option value="1">Female</option>
        </select>

        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result">{{ result }}</div>
    {% endif %}

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
