<!DOCTYPE html>
<html>
<head>
    <title>Churn Prediction</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            transition: 0.3s;
        }

        body.light-mode {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1f2937, #374151);
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 15px;
            background: white;
        }

        body.dark-mode .container {
            background: #2d3748;
        }

        /* COMPACT GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        input, select {
            padding: 8px;
            border-radius: 8px;
            width: 100%;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* SMALL TOGGLE BUTTON */
        .toggle-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 6px;
            background: #6b7280;
            color: white;
            cursor: pointer;
        }

        #result {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        #probability {
            text-align: center;
            font-size: 18px;
            margin-top: 5px;
        }

        #explanation {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>

<body class="light-mode">

<button class="toggle-btn" onclick="toggleMode()">Mode</button>

<div class="container">
    <h2 style="text-align:center;">Churn Prediction</h2>

    <!-- GRID INPUTS -->
    <div class="grid">
        <input id="creditScore" type="number" placeholder="Credit Score (300-900)">
        <input id="age" type="number" placeholder="Age (18-100)">
        <input id="tenure" type="number" placeholder="Tenure (0-10)">
        <input id="balance" type="number" placeholder="Balance">
        <input id="products" type="number" placeholder="Products (1-4)">
        <input id="salary" type="number" placeholder="Salary">
    </div>

    <select id="gender">
        <option>Male</option>
        <option>Female</option>
    </select>

    <select id="geography">
        <option>France</option>
        <option>Germany</option>
        <option>Spain</option>
    </select>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
    <div id="probability"></div>

    <!-- Graph -->
    <div style="max-width: 400px; margin: 30px auto;">
        <canvas id="chart"></canvas>
    </div>

    <div id="explanation"></div>
</div>

<script>
let chart;

function toggleMode() {
    document.body.classList.toggle("dark-mode");
    document.body.classList.toggle("light-mode");
}

function predict() {

    const data = {
        CreditScore: +creditScore.value,
        Age: +age.value,
        Tenure: +tenure.value,
        Balance: +balance.value,
        NumOfProducts: +products.value,
        EstimatedSalary: +salary.value,
        Gender: gender.value,
        Geography: geography.value
    };

    fetch("/predict_churn", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {

        let color = data.Churn_Prediction === 1 ? "red" : "green";

        // RESULT TEXT
        document.getElementById("result").innerHTML =
            `<span style="color:${color}">Customer will ${data.Churn_Prediction === 1 ? "CHURN" : "STAY"}</span>`;

        // PROBABILITY
        document.getElementById("probability").innerHTML =
            `<span style="color:${color}">Probability: ${(data.Churn_Probability * 100).toFixed(2)}%</span>`;

        // GRAPH
        if (chart) chart.destroy();

        chart = new Chart(document.getElementById("chart"), {
            type: "doughnut",
            data: {
                labels: ["Churn", "Safe"],
                datasets: [{
                    data: [data.Churn_Probability, 1 - data.Churn_Probability]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true
            }
        });

        // EXPLANATION
        document.getElementById("explanation").innerHTML =
            `<h3>Why churn?</h3><p>${data.explanation}</p>`;
    });
}
</script>

</body>
</html>
