<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Churn Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body.dark {
    background: #121212;
    color: white;
}
body.light {
    background: #f5f5f5;
    color: black;
}
.card {
    border-radius: 15px;
}
.spinner {
    display: none;
}
</style>
</head>

<body class="dark">

<div class="container mt-3 text-end">
    <button onclick="toggleMode()" class="btn btn-secondary">🌙/☀️ Toggle Mode</button>
</div>

<div class="container text-center mt-3">
    <h1>💳 Churn Prediction</h1>
</div>

<div class="container mt-4">
<div class="card p-4 shadow">

<div class="row">
    <div class="col-md-4 mb-3">
        <label>Credit Score</label>
        <input type="number" name="CreditScore" class="form-control">
    </div>

    <div class="col-md-4 mb-3">
        <label>Age</label>
        <input type="number" name="Age" class="form-control">
    </div>

    <div class="col-md-4 mb-3">
        <label>Tenure</label>
        <input type="number" name="Tenure" class="form-control">
    </div>
</div>

<div class="row">
    <div class="col-md-4 mb-3">
        <label>Balance</label>
        <input type="number" name="Balance" class="form-control">
    </div>

    <div class="col-md-4 mb-3">
        <label>Products</label>
        <input type="number" name="NumOfProducts" class="form-control">
    </div>

    <div class="col-md-4 mb-3">
        <label>Salary</label>
        <input type="number" name="EstimatedSalary" class="form-control">
    </div>
</div>

<div class="row">
    <div class="col-md-6 mb-3">
        <label>Gender</label>
        <select name="Gender" class="form-control">
            <option>Male</option>
            <option>Female</option>
        </select>
    </div>

    <div class="col-md-6 mb-3">
        <label>Geography</label>
        <select name="Geography" class="form-control">
            <option>France</option>
            <option>Germany</option>
            <option>Spain</option>
        </select>
    </div>
</div>

<div class="text-center">
    <button onclick="predictChurn()" class="btn btn-primary w-50">Predict</button>
</div>

<div class="text-center mt-3">
    <div class="spinner-border text-primary spinner" id="loading"></div>
</div>

</div>
</div>

<div class="container text-center mt-4">
    <div id="result" class="p-3 rounded"></div>
</div>

<div class="container mt-4">
    <canvas id="gaugeChart"></canvas>
</div>

<div class="container mt-4">
    <div id="explanation"></div>
</div>

<script>

let chart;

function toggleMode(){
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

function predictChurn(){
    document.getElementById("loading").style.display = "block";

    const data = {
        CreditScore: document.querySelector('[name="CreditScore"]').value,
        Age: document.querySelector('[name="Age"]').value,
        Tenure: document.querySelector('[name="Tenure"]').value,
        Balance: document.querySelector('[name="Balance"]').value,
        NumOfProducts: document.querySelector('[name="NumOfProducts"]').value,
        EstimatedSalary: document.querySelector('[name="EstimatedSalary"]').value,
        Gender: document.querySelector('[name="Gender"]').value,
        Geography: document.querySelector('[name="Geography"]').value
    };

    fetch('/predict_churn',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
    })
    .then(res=>res.json())
    .then(res=>{
        document.getElementById("loading").style.display = "none";

        if(res.error){
            document.getElementById("result").innerHTML = res.error;
            return;
        }

        let prob = res.Churn_Probability * 100;

        // Color result
        let color = res.Churn_Prediction==1 ? "red" : "green";
        let text = res.Churn_Prediction==1 ? "Customer will CHURN" : "Customer will STAY";

        document.getElementById("result").innerHTML =
            "<h3 style='color:"+color+"'>" + text + "</h3>" +
            "<p>Probability: "+prob.toFixed(2)+"%</p>";

        // Chart
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('gaugeChart'),{
            type:'doughnut',
            data:{
                datasets:[{
                    data:[prob,100-prob]
                }]
            }
        });

        // Explanation (simple logic)
        let explanation = "Main factors: ";
        if(data.CreditScore < 500) explanation += "Low Credit Score, ";
        if(data.Age > 50) explanation += "High Age, ";
        if(data.Balance > 100000) explanation += "High Balance, ";

        document.getElementById("explanation").innerHTML =
            "<b>Why churn?</b><br>" + explanation;

    })
    .catch(()=>{
        document.getElementById("loading").style.display = "none";
        document.getElementById("result").innerHTML = "Server error";
    });
}

</script>

</body>
</html>
