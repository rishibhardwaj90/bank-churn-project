<!DOCTYPE html>
<html>
<head>
    <title>Churn Prediction</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            transition: 0.3s;
        }

        /* LIGHT MODE */
        body.light-mode {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #111;
        }

        /* DARK MODE */
        body.dark-mode {
            background: linear-gradient(135deg, #1f2937, #374151);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 15px;
            background: white;
        }

        body.dark-mode .container {
            background: #2d3748;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
        }

        input::placeholder {
            color: #9ca3af;
        }

        body.dark-mode input::placeholder {
            color: #d1d5db;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
        }

        .toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        #result {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        #explanation {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>

<body class="light-mode">

<button class="toggle-btn" onclick="toggleMode()">Toggle Mode</button>

<div class="container">
    <h2 style="text-align:center;">Churn Prediction</h2>

    <input id="creditScore" type="number" placeholder="300 - 900" min="300" max="900">
    <input id="age" type="number" placeholder="18 - 100" min="18" max="100">
    <input id="tenure" type="number" placeholder="0 - 10" min="0" max="10">
    <input id="balance" type="number" placeholder="0 - 250000" min="0" max="250000">
    <input id="products" type="number" placeholder="1 - 4" min="1" max="4">
    <input id="salary" type="number" placeholder="10000 - 200000" min="10000" max="200000">

    <select id="gender">
        <option>Male</option>
        <option>Female</option>
    </select>

    <select id="geography">
        <option>France</option>
        <option>Germany</option>
        <option>Spain</option>
    </select>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>

    <div style="max-width: 400px; margin: 30px auto;">
        <canvas id="chart"></canvas>
    </div>

    <div id="explanation"></div>
</div>

<script>
let chart;

function toggleMode() {
    document.body.classList.toggle("dark-mode");
    document.body.classList.toggle("light-mode");
}

function validateInputs(data) {
    if (data.CreditScore < 300 || data.CreditScore > 900) return "Invalid Credit Score";
    if (data.Age < 18 || data.Age > 100) return "Invalid Age";
    if (data.Tenure < 0 || data.Tenure > 10) return "Invalid Tenure";
    if (data.Balance < 0) return "Invalid Balance";
    if (data.NumOfProducts < 1 || data.NumOfProducts > 4) return "Invalid Products";
    if (data.EstimatedSalary < 10000) return "Invalid Salary";
    return null;
}

function predict() {

    const data = {
        CreditScore: +creditScore.value,
        Age: +age.value,
        Tenure: +tenure.value,
        Balance: +balance.value,
        NumOfProducts: +products.value,
        EstimatedSalary: +salary.value,
        Gender: gender.value,
        Geography: geography.value
    };

    let error = validateInputs(data);
    if (error) {
        alert(error);
        return;
    }

    fetch("/predict_churn", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {

        // RESULT TEXT
        document.getElementById("result").innerHTML =
            data.Churn_Prediction === 1
            ? "<span style='color:red'>Customer will CHURN</span>"
            : "<span style='color:green'>Customer is SAFE</span>";

        // CHART FIXED SIZE
        if (chart) chart.destroy();

        chart = new Chart(document.getElementById("chart"), {
            type: "doughnut",
            data: {
                labels: ["Churn", "Safe"],
                datasets: [{
                    data: [data.Churn_Probability, 1 - data.Churn_Probability]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true
            }
        });

        // EXPLANATION FIX
        const explanationDiv = document.getElementById("explanation");
        explanationDiv.innerHTML = `
            <h3>Why churn?</h3>
            <p>${data.explanation}</p>
        `;
    });
}
</script>

</body>
</html>
