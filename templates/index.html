<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Churn Predictor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }
        .card {
            border-radius: 15px;
        }
        .result-box {
            font-size: 1.3rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Churn Prediction System</span>
    </div>
</nav>

<div class="container text-center mt-4">
    <h1>Customer Churn Prediction</h1>
    <p>Fill details and check if customer will leave</p>
</div>

<div class="container mt-4">
    <div class="card p-4 shadow-lg">

        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Credit Score</label>
                <input type="number" name="CreditScore" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Age</label>
                <input type="number" name="Age" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Tenure</label>
                <input type="number" name="Tenure" class="form-control">
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Balance</label>
                <input type="number" name="Balance" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Number of Products</label>
                <input type="number" name="NumOfProducts" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Estimated Salary</label>
                <input type="number" name="EstimatedSalary" class="form-control">
            </div>
        </div>

        <div class="text-center">
            <button onclick="predictChurn()" class="btn btn-primary w-50 mt-3">
                Predict
            </button>
        </div>

    </div>
</div>

<div class="container text-center mt-4">
    <div id="result" class="alert alert-info result-box"></div>
</div>

<script>
function predictChurn() {
    const data = {
        CreditScore: document.querySelector('[name="CreditScore"]').value,
        Age: document.querySelector('[name="Age"]').value,
        Tenure: document.querySelector('[name="Tenure"]').value,
        Balance: document.querySelector('[name="Balance"]').value,
        NumOfProducts: document.querySelector('[name="NumOfProducts"]').value,
        EstimatedSalary: document.querySelector('[name="EstimatedSalary"]').value
    };

    document.getElementById("result").innerHTML = "Predicting...";

    fetch('/predict_churn', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(result => {
        if (result.error) {
            document.getElementById("result").innerHTML = "Error: " + result.error;
        } else {
            const status = result.Churn_Prediction === 1 ? "Customer will CHURN" : "Customer will STAY";
            const prob = (result.Churn_Probability * 100).toFixed(2);

            document.getElementById("result").innerHTML =
                status + "<br>Probability: " + prob + "%";
        }
    })
    .catch(() => {
        document.getElementById("result").innerHTML = "Server Error";
    });
}
</script>

</body>
</html>
