<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Customer Churn Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Bank Customer Churn Prediction</h1>

    <form id="churnForm" action="/predict" method="POST">
        <input type="number" placeholder="Credit Score" id="creditScore" required>
        
        <select id="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <select id="geography">
            <option value="France">France</option>
            <option value="Germany">Germany</option>
            <option value="Spain">Spain</option>
        </select>

        <input type="number" placeholder="Tenure" id="tenure" required>
        <input type="number" placeholder="Balance" id="balance" required>
        <input type="number" placeholder="Number of Products" id="products" required>

        <select id="card">
            <option value="1">Has Credit Card</option>
            <option value="0">No Credit Card</option>
        </select>

        <select id="active">
            <option value="1">Active Member</option>
            <option value="0">Inactive Member</option>
        </select>

        <input type="number" placeholder="Estimated Salary" id="salary" required>

        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>
</div>

<script>
document.getElementById("churnForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        CreditScore: parseInt(document.getElementById("creditScore").value),
        Gender: document.getElementById("gender").value,
        Geography: document.getElementById("geography").value,
        Tenure: parseInt(document.getElementById("tenure").value),
        Balance: parseFloat(document.getElementById("balance").value),
        NumOfProducts: parseInt(document.getElementById("products").value),
        HasCrCard: parseInt(document.getElementById("card").value),
        IsActiveMember: parseInt(document.getElementById("active").value),
        EstimatedSalary: parseFloat(document.getElementById("salary").value)
    };

    const response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerHTML = 
        `<h2>Prediction: ${result.Churn_Prediction}</h2>
         <h3>Probability: ${result.Churn_Probability.toFixed(2)}</h3>`;
});
</script>

</body>
</html>
